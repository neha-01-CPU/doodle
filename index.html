<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo - The Ultimate Drawing Game</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- CSS: THE SKIN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* FIX: 100dvh prevents mobile address bars from hiding the chat box */
        body { background: linear-gradient(135deg, #a8cbf0 0%, #d8b4e2 50%, #f6c1d4 100%); height: 100dvh; width: 100vw; overflow: hidden; color: #333; }
        .hidden { display: none !important; }

        /* --- LOBBY SCREEN --- */
        #lobby-screen { height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .glass-card { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .logo-text { font-size: 2.5rem; color: #7c3aed; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { font-size: 0.95rem; color: #555; margin-bottom: 30px; font-weight: 500; }
        .name-input { width: 100%; padding: 16px; border: 2px solid rgba(124, 58, 237, 0.3); border-radius: 14px; outline: none; text-align: center; font-size: 1.1rem; background: rgba(255,255,255,0.8); margin-bottom: 25px; transition: border 0.3s; }
        .name-input:focus { border: 2px solid #7c3aed; }
        .avatar-label { font-weight: 600; margin-bottom: 15px; font-size: 0.95rem; }
        .avatar-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar-frame { width: 110px; height: 110px; border-radius: 16px; background: rgba(255,255,255,0.8); border: 3px solid #7c3aed; display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: inset 0 4px 10px rgba(0,0,0,0.05); }
        #current-avatar { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        .arrow-btn { background: rgba(255,255,255,0.5); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .arrow-btn:hover { background: rgba(255,255,255,0.9); }
        .primary-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(90deg, #7c3aed, #6d28d9); color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); transition: transform 0.1s; }
        .primary-btn:active { transform: scale(0.98); }

        /* --- GAME SCREEN --- */
        #game-page { height: 100dvh; width: 100vw; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .game-header { flex: 0 0 auto; height: 60px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-left { display: flex; flex-direction: column; align-items: flex-start; }
        .timer { font-size: 1.2rem; font-weight: 800; color: #7c3aed; display: flex; align-items: center; gap: 5px; }
        .round-info { font-size: 0.7rem; color: #555; font-weight: 600; }
        .word-blanks { font-size: 1.5rem; letter-spacing: 3px; font-weight: 800; color: #333; }
        .mute-btn { background: none; border: none; color: #555; cursor: pointer; }

        .canvas-container { flex: 1 1 50%; min-height: 0; background: white; border-radius: 20px; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
        canvas { flex: 1; width: 100%; cursor: crosshair; touch-action: none; }
        
        .toolbar { flex: 0 0 auto; height: 55px; background: rgba(248, 250, 252, 0.95); border-top: 1px solid #e2e8f0; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 0 10px; position: relative; }
        .tool-btn { background: none; border: none; color: #64748b; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; padding: 5px; }
        .tool-btn.active { color: #7c3aed; }
        .color-indicator { width: 22px; height: 22px; border-radius: 50%; background: black; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        
        .popup-menu { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.active { border: 2px solid #333; transform: scale(1.1); }
        .brush-slider { width: 150px; accent-color: #7c3aed; }

        .bottom-split { flex: 1 1 40%; min-height: 0; display: flex; gap: 10px; }
        .panel { flex: 1; min-height: 0; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6); display: flex; flex-direction: column; overflow: hidden; padding: 10px; }
        .panel h3 { flex: 0 0 auto; font-size: 0.9rem; text-align: center; margin-bottom: 10px; color: #555; }
        
        .player-list { flex: 1; overflow-y: auto; list-style: none; }
        .player-item { display: flex; align-items: center; gap: 10px; padding: 5px; background: rgba(255,255,255,0.6); border-radius: 10px; margin-bottom: 5px; }
        .player-item img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
        .player-info { display: flex; flex-direction: column; }
        .p-name { font-size: 0.85rem; font-weight: 700; }
        .p-score { font-size: 0.75rem; color: #666; }

        /* FIX: Chat Layout */
        .chat-history { flex: 1; min-height: 0; overflow-y: auto; font-size: 0.85rem; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        .chat-msg { flex: 0 0 auto; padding: 6px 10px; background: rgba(255,255,255,0.8); border-radius: 8px; word-wrap: break-word; }
        .chat-system { color: #7c3aed; font-weight: bold; font-style: italic; background: none; }
        
        .chat-form { flex: 0 0 auto; display: flex; gap: 5px; width: 100%; margin-top: auto; }
        .chat-input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; width: 100%; }
        .chat-input:focus { border: 1px solid #7c3aed; }
        .chat-send-btn { flex: 0 0 auto; background: #7c3aed; color: white; border: none; border-radius: 10px; padding: 0 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="glass-card">
            <h1 class="logo-text">Picazo</h1>
            <p class="subtitle">The Ultimate Drawing Game</p>
            <input type="text" id="player-name" class="name-input" placeholder="Enter your name" autocomplete="off" maxlength="15">
            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-frame"><img id="current-avatar" src="" alt="Avatar"></div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>
            <button id="play-btn" class="primary-btn">PLAY NOW</button>
        </div>
    </div>

    <div id="game-page" class="hidden">
        <div class="game-header">
            <div class="header-left">
                <div class="timer"><i data-lucide="clock" size="18"></i> 60</div>
                <div class="round-info">Round 1 of 5</div>
            </div>
            <div class="word-blanks">_ _ _ _ _ <span style="font-size: 0.8rem; color: #888;">(5)</span></div>
            <button class="mute-btn"><i data-lucide="volume-2" size="20"></i></button>
        </div>

        <div class="canvas-container">
            <canvas id="drawingBoard"></canvas>
            
            <div id="color-popup" class="popup-menu hidden">
                <div class="color-grid" id="color-grid"></div>
                <input type="color" id="native-color" style="width:100%; margin-top:5px; height:30px; cursor:pointer;">
            </div>

            <div id="size-popup" class="popup-menu hidden">
                <label style="font-size:0.8rem; font-weight:bold; color:#555; text-align:center; display:block; margin-bottom:5px;">Brush Size: <span id="size-label">3</span>px</label>
                <input type="range" id="tool-size" class="brush-slider" min="1" max="30" value="3">
            </div>

            <div class="toolbar">
                <button id="tool-pencil" class="tool-btn active"><i data-lucide="pencil" size="20"></i></button>
                <button id="tool-color-btn" class="tool-btn"><div id="color-indicator" class="color-indicator"></div></button>
                <button id="tool-size-btn" class="tool-btn"><i data-lucide="circle-dot" size="20"></i></button>
                <button id="tool-eraser" class="tool-btn"><i data-lucide="eraser" size="20"></i></button>
                <button id="tool-fill" class="tool-btn"><i data-lucide="paint-bucket" size="20"></i></button>
                <button id="tool-undo" class="tool-btn"><i data-lucide="undo-2" size="20"></i></button>
                <button id="tool-trash" class="tool-btn"><i data-lucide="trash-2" size="20"></i></button>
            </div>
        </div>

        <div class="bottom-split">
            <div class="panel leaderboard">
                <h3>Players</h3>
                <ul class="player-list">
                    <li class="player-item">
                        <img id="in-game-avatar" src="" alt="Player">
                        <div class="player-info">
                            <span class="p-name" id="in-game-name">You</span>
                            <span class="p-score">0 pts <i data-lucide="pencil" size="10" style="color: #7c3aed;"></i></span>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="panel chat">
                <h3>Chat</h3>
                <div class="chat-history" id="chat-box">
                    <span class="chat-msg chat-system">System: Game started!</span>
                </div>
                <form id="chat-form" class="chat-form">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Guess here..." autocomplete="off">
                    <button type="submit" class="chat-send-btn"><i data-lucide="send" size="16"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 12 Premium Avatars
        const avatars = [
            "https://api.dicebear.com/7.x/micah/svg?seed=P1&backgroundColor=b6e3f4", "https://api.dicebear.com/7.x/shapes/svg?seed=P2&backgroundColor=c0aede",
            "https://api.dicebear.com/7.x/bottts/svg?seed=P3&backgroundColor=ffd5dc", "https://api.dicebear.com/7.x/micah/svg?seed=P4&backgroundColor=ffdfbf",
            "https://api.dicebear.com/7.x/shapes/svg?seed=P5&backgroundColor=d1d4f9", "https://api.dicebear.com/7.x/micah/svg?seed=P6&backgroundColor=b6e3f4",
            "https://api.dicebear.com/7.x/bottts/svg?seed=P7&backgroundColor=c0aede", "https://api.dicebear.com/7.x/shapes/svg?seed=P8&backgroundColor=ffd5dc",
            "https://api.dicebear.com/7.x/micah/svg?seed=P9&backgroundColor=ffdfbf", "https://api.dicebear.com/7.x/bottts/svg?seed=P10&backgroundColor=b6e3f4",
            "https://api.dicebear.com/7.x/shapes/svg?seed=P11&backgroundColor=d1d4f9", "https://api.dicebear.com/7.x/micah/svg?seed=P12&backgroundColor=c0aede"
        ];
        let avatarIndex = 0;
        document.getElementById('current-avatar').src = avatars[avatarIndex];
        document.getElementById('next-avatar').addEventListener('click', () => { avatarIndex = (avatarIndex + 1) % avatars.length; document.getElementById('current-avatar').src = avatars[avatarIndex]; });
        document.getElementById('prev-avatar').addEventListener('click', () => { avatarIndex = (avatarIndex - 1 + avatars.length) % avatars.length; document.getElementById('current-avatar').src = avatars[avatarIndex]; });

        document.getElementById('play-btn').addEventListener('click', () => {
            const name = document.getElementById('player-name').value.trim();
            if (name === "") return alert("Please enter a name!");
            document.getElementById('in-game-name').textContent = name;
            document.getElementById('in-game-avatar').src = avatars[avatarIndex];
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            setTimeout(initCanvas, 100); 
        });

        // --- DRAWING ENGINE ---
        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d', { willReadFrequently: true }); // Optimized for fill tool
        let isDrawing = false, isErasing = false, isFilling = false, drawingHistory = [];
        let currentColor = '#000000';
        let currentBrushSize = 3;

        function initCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight - 55; 
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) return { x: Math.floor(e.touches[0].clientX - rect.left), y: Math.floor(e.touches[0].clientY - rect.top) };
            return { x: Math.floor(e.clientX - rect.left), y: Math.floor(e.clientY - rect.top) };
        }

        function startAction(e) {
            const pos = getPos(e);
            
            // FIX: Smart Flood Fill Algorithm
            if (isFilling) {
                smartFloodFill(pos.x, pos.y, currentColor);
                return;
            }

            isDrawing = true; 
            ctx.beginPath(); 
            ctx.moveTo(pos.x, pos.y); 
            draw(e); 
        }

        function endAction() { if (isDrawing) { isDrawing = false; ctx.closePath(); saveState(); } }
        
        function draw(e) {
            if (!isDrawing || isFilling) return;
            e.preventDefault(); 
            ctx.lineWidth = currentBrushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = isErasing ? "white" : currentColor;
            ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke();
        }

        canvas.addEventListener('mousedown', startAction); canvas.addEventListener('mouseup', endAction);
        canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseout', endAction);
        canvas.addEventListener('touchstart', startAction, {passive: false}); canvas.addEventListener('touchend', endAction); canvas.addEventListener('touchmove', draw, {passive: false});

        // --- SMART FLOOD FILL ALGORITHM ---
        function hexToRgba(hex) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return {r, g, b, a: 255};
        }

        function smartFloodFill(startX, startY, fillHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width, h = canvas.height;
            
            const startPos = (startY * w + startX) * 4;
            const startR = data[startPos], startG = data[startPos + 1], startB = data[startPos + 2];
            const fill = hexToRgba(fillHex);
            
            // If the color clicked is already the fill color, do nothing
            if (startR === fill.r && startG === fill.g && startB === fill.b) return;

            const stack = [[startX, startY]];
            
            while (stack.length > 0) {
                let [x, y] = stack.pop();
                let pos = (y * w + x) * 4;
                
                // Move up to the top edge of the shape
                while (y >= 0 && matchColor(pos)) { y--; pos -= w * 4; }
                pos += w * 4; y++;
                
                let reachLeft = false, reachRight = false;
                
                // Scan downwards
                while (y < h && matchColor(pos)) {
                    data[pos] = fill.r; data[pos+1] = fill.g; data[pos+2] = fill.b; data[pos+3] = 255; // Fill pixel
                    
                    if (x > 0) {
                        if (matchColor(pos - 4)) { if (!reachLeft) { stack.push([x - 1, y]); reachLeft = true; } }
                        else if (reachLeft) { reachLeft = false; }
                    }
                    if (x < w - 1) {
                        if (matchColor(pos + 4)) { if (!reachRight) { stack.push([x + 1, y]); reachRight = true; } }
                        else if (reachRight) { reachRight = false; }
                    }
                    y++; pos += w * 4;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            saveState();

            function matchColor(p) {
                return data[p] === startR && data[p+1] === startG && data[p+2] === startB;
            }
        }

        // Tools Setup
        const btnColor = document.getElementById('tool-color-btn'), popupColor = document.getElementById('color-popup');
        const btnSize = document.getElementById('tool-size-btn'), popupSize = document.getElementById('size-popup');
        
        btnColor.addEventListener('click', () => { popupColor.classList.toggle('hidden'); popupSize.classList.add('hidden'); });
        btnSize.addEventListener('click', () => { popupSize.classList.toggle('hidden'); popupColor.classList.add('hidden'); });
        canvas.addEventListener('touchstart', () => { popupColor.classList.add('hidden'); popupSize.classList.add('hidden'); });

        const palette = ['#000000', '#ffffff', '#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#f97316', '#ec4899', '#06b6d4', '#84cc16', '#8b5cf6'];
        const grid = document.getElementById('color-grid');
        palette.forEach(col => {
            let div = document.createElement('div');
            div.className = 'color-swatch'; div.style.backgroundColor = col;
            if(col === '#000000') div.classList.add('active');
            div.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                div.classList.add('active'); currentColor = col; document.getElementById('color-indicator').style.backgroundColor = col;
                isErasing = false; isFilling = false; document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tool-pencil').classList.add('active');
                popupColor.classList.add('hidden');
            });
            grid.appendChild(div);
        });

        document.getElementById('native-color').addEventListener('input', (e) => {
            currentColor = e.target.value; document.getElementById('color-indicator').style.backgroundColor = e.target.value;
            isErasing = false; isFilling = false; document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tool-pencil').classList.add('active');
        });

        document.getElementById('tool-size').addEventListener('input', (e) => {
            currentBrushSize = e.target.value; document.getElementById('size-label').textContent = currentBrushSize;
        });

        const setTool = (id) => {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        document.getElementById('tool-pencil').addEventListener('click', () => { isErasing = false; isFilling = false; setTool('tool-pencil'); });
        document.getElementById('tool-eraser').addEventListener('click', () => { isErasing = true; isFilling = false; setTool('tool-eraser'); });
        document.getElementById('tool-fill').addEventListener('click', () => { isFilling = true; isErasing = false; setTool('tool-fill'); });
        document.getElementById('tool-trash').addEventListener('click', () => { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); setTool('tool-pencil'); isFilling = false; isErasing = false; });

        function saveState() { drawingHistory.push(canvas.toDataURL()); if (drawingHistory.length > 15) drawingHistory.shift(); }
        document.getElementById('tool-undo').addEventListener('click', () => {
            if (drawingHistory.length > 1) {
                drawingHistory.pop(); const img = new Image(); img.src = drawingHistory[drawingHistory.length - 1];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
            }
        });

        // Chat
        document.getElementById('chat-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const msgText = document.getElementById('chat-input').value.trim();
            if (msgText !== '') {
                const name = document.getElementById('in-game-name').textContent;
                const msgSpan = document.createElement('span'); msgSpan.className = 'chat-msg';
                msgSpan.innerHTML = `<strong>${name}:</strong> ${msgText}`;
                document.getElementById('chat-box').appendChild(msgSpan);
                document.getElementById('chat-input').value = ''; 
                document.getElementById('chat-input').blur(); 
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            }
        });
    </script>
</body>
</html>
